# Font Configuration
# Primary font for all text
font_family      Anonymous Pro
bold_font        Anonymous Pro Bold
italic_font      Anonymous Pro Italic
bold_italic_font Anonymous Pro Bold Italic

# Nerd Font Symbol Map
# Maps specific Unicode ranges to JetBrainsMono Nerd Font for icon support.
# This allows Anonymous Pro for regular text while using Nerd Font glyphs
# for icons in tmux status bars, shell prompts, and other tools.
#
# Ranges include:
#   U+E000-U+E00A   - Powerline symbols
#   U+E0A0-U+E0D7   - Powerline Extra
#   U+E200-U+E2A9   - Font Awesome Extension
#   U+E300-U+E3E3   - Weather Icons
#   U+E5FA-U+E6B5   - Seti-UI + Custom
#   U+E700-U+E7C5   - Devicons
#   U+EA60-U+EBEB   - Codicons
#   U+ED00-U+EFC1   - Font Awesome
#   U+F000-U+F2FF   - Font Awesome (classic)
#   U+F300-U+F372   - Font Logos
#   U+F400-U+F533   - Octicons
#   U+F0001-U+F1AF0 - Material Design Icons
symbol_map U+E000-U+E00A,U+EA60-U+EBEB,U+E0A0-U+E0C8,U+E0CA,U+E0CC-U+E0D7,U+E200-U+E2A9,U+E300-U+E3E3,U+E5FA-U+E6B5,U+E700-U+E7C5,U+ED00-U+EFC1,U+F000-U+F2FF,U+F300-U+F372,U+F400-U+F533,U+F0001-U+F1AF0 JetBrainsMono Nerd Font

# Shell
shell /usr/bin/zsh

# Cursor
cursor_shape beam
shell_integration enabled cursor
cursor_trail 5
cursor_trail_decay 0.15 0.5
cursor_trail_start_threshold 2

# Scrolling
touch_scroll_multiplier 3.0

# Bell
enable_audio_bell no
